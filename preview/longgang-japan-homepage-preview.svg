<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1800" viewBox="0 0 1440 1800" role="img" aria-labelledby="title desc">
  <title id="title">龙岗企业出海日本服务官网截图预览</title>
  <desc id="desc">静态预览图展示网站首页首屏、日本市场介绍、电商入驻服务、PR传播服务和联系表单的整体视觉。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8f2"/>
      <stop offset="1" stop-color="#f7f3ec"/>
    </linearGradient>
    <radialGradient id="glow" cx="12%" cy="8%" r="45%">
      <stop offset="0" stop-color="#9b2f2f" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#9b2f2f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#1d2528" flood-opacity="0.13"/>
    </filter>
    <style>
      .sans{font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}.serif{font-family:"Noto Serif SC","Songti SC",serif}.ink{fill:#1d2528}.muted{fill:#657276}.red{fill:#9b2f2f}.gold{fill:#b99a61}.small{font-size:18px;letter-spacing:3px;font-weight:700}.body{font-size:23px}.h1{font-size:76px;font-weight:700;letter-spacing:-4px}.h2{font-size:48px;font-weight:700;letter-spacing:-2px}.h3{font-size:28px;font-weight:700}.label{font-size:18px;font-weight:700}.nav{font-size:18px}.card{fill:#fffdf8;stroke:#ded6c8;stroke-width:1.3}.line{stroke:#ded6c8;stroke-width:1.5}.btnText{font-size:20px;font-weight:700}.field{fill:#fff;stroke:#ded6c8;stroke-width:1.4}
    </style>
  </defs>
  <rect width="1440" height="1800" fill="url(#paper)"/>
  <rect width="1440" height="1800" fill="url(#glow)"/>

  <rect x="0" y="0" width="1440" height="78" fill="#fbf8f2" opacity="0.92"/>
  <line x1="0" y1="78" x2="1440" y2="78" class="line" opacity="0.85"/>
  <circle cx="150" cy="39" r="22" fill="#9b2f2f"/>
  <text x="150" y="49" fill="#fff" text-anchor="middle" class="serif" font-size="24">和</text>
  <text x="184" y="33" class="sans ink" font-size="20" font-weight="700">Longgang Japan Bridge</text>
  <text x="184" y="55" class="sans muted" font-size="13">龙岗企业出海日本服务</text>
  <text x="800" y="47" class="sans nav ink">日本市场介绍</text>
  <text x="950" y="47" class="sans nav ink">电商入驻服务</text>
  <text x="1100" y="47" class="sans nav ink">PR传播服务</text>
  <text x="1235" y="47" class="sans nav ink">联系我们</text>

  <text x="130" y="185" class="sans small red">SHENZHEN LONGGANG × JAPAN MARKET ENTRY</text>
  <text x="130" y="280" class="serif h1 ink">帮助龙岗制造与品牌企业，</text>
  <text x="130" y="368" class="serif h1 ink">稳健进入日本市场。</text>
  <text x="130" y="430" class="sans body muted">以日本咨询公司的克制、可信与长期主义为风格，提供市场研究、渠道入驻、媒体传播</text>
  <text x="130" y="468" class="sans body muted">与本地化运营方案，让出海不止是开店，而是建立可持续的日本业务。</text>
  <rect x="130" y="520" rx="25" ry="25" width="230" height="54" fill="#9b2f2f" filter="url(#shadow)"/>
  <text x="245" y="555" text-anchor="middle" class="sans btnText" fill="#fff">预约日本出海诊断</text>
  <rect x="380" y="520" rx="25" ry="25" width="170" height="54" fill="#fffdf8" stroke="#ded6c8"/>
  <text x="465" y="555" text-anchor="middle" class="sans btnText ink">查看服务方案</text>

  <path d="M870 150 H1270 Q1310 150 1310 190 V515 Q1310 555 1270 555 H870 Q830 555 830 515 V190 Q830 150 870 150Z" fill="#253b38" filter="url(#shadow)"/>
  <path d="M858 178 H1282 V527 H858Z" fill="none" stroke="#fff" stroke-opacity="0.25"/>
  <circle cx="950" cy="250" r="58" fill="#b99a61" opacity="0.23"/>
  <circle cx="1100" cy="318" r="110" fill="#fff" opacity="0.07"/>
  <text x="880" y="425" class="sans small gold">SERVICE SCOPE</text>
  <text x="880" y="480" class="serif" font-size="48" fill="#fff" font-weight="700">Market / EC / PR</text>
  <text x="880" y="523" class="sans" font-size="20" fill="#fff" opacity="0.78">从进入策略到落地执行，适配消费电子、家居生活、跨境电商与智能制造。</text>

  <line x1="130" y1="690" x2="1310" y2="690" class="line"/>
  <text x="130" y="760" class="sans small red">WHY JAPAN</text>
  <text x="130" y="830" class="serif h2 ink">日本市场需要细致、长期且本地化的进入策略。</text>
  <text x="745" y="760" class="sans body muted">日本消费者重视品质、信任背书、售后体验与品牌叙事。龙岗企业具备供应链、</text>
  <text x="745" y="800" class="sans body muted">产品迭代与制造成本优势，但在日本市场通常面临法规标准、平台规则、语言表达、</text>
  <text x="745" y="840" class="sans body muted">媒体信任与渠道运营等挑战。我们将这些挑战拆解成可执行的路径。</text>
  <line x1="130" y1="910" x2="1310" y2="910" class="line"/>

  <text x="130" y="1000" class="sans small red">01 / MARKET INSIGHT</text>
  <text x="130" y="1065" class="serif h2 ink">日本市场介绍</text>
  <text x="130" y="1110" class="sans body muted">以行业数据、竞品观察、消费者画像和渠道结构为基础，判断如何进入日本。</text>
  <g transform="translate(130 1160)">
    <rect class="card" width="370" height="210"/>
    <text x="32" y="55" class="serif h3 ink">行业机会评估</text>
    <text x="32" y="102" class="sans body muted">梳理日本细分赛道规模、</text><text x="32" y="138" class="sans body muted">消费趋势、价格带与进入门槛。</text>
    <rect class="card" x="405" width="370" height="210"/>
    <text x="437" y="55" class="serif h3 ink">消费者与场景洞察</text>
    <text x="437" y="102" class="sans body muted">围绕购买习惯、审美偏好、</text><text x="437" y="138" class="sans body muted">评价敏感点输出本地化方向。</text>
    <rect class="card" x="810" width="370" height="210"/>
    <text x="842" y="55" class="serif h3 ink">合规与渠道地图</text>
    <text x="842" y="102" class="sans body muted">提示认证、标签、售后、</text><text x="842" y="138" class="sans body muted">物流和平台规则风险。</text>
  </g>

  <text x="130" y="1470" class="sans small red">02 / E-COMMERCE ENTRY</text>
  <text x="130" y="1535" class="serif h2 ink">电商入驻服务</text>
  <text x="130" y="1580" class="sans body muted">覆盖账号筹备、商品页本地化与上线运营。</text>
  <g transform="translate(610 1440)">
    <rect class="card" width="700" height="82"/><text x="28" y="35" class="sans label gold">STEP 1</text><text x="120" y="35" class="serif h3 ink">平台与品类诊断</text><text x="120" y="66" class="sans" font-size="18" fill="#657276">评估产品适配平台、价格带、竞争强度、库存与物流方案。</text>
    <rect class="card" y="100" width="700" height="82"/><text x="28" y="135" class="sans label gold">STEP 2</text><text x="120" y="135" class="serif h3 ink">入驻资料准备</text><text x="120" y="166" class="sans" font-size="18" fill="#657276">整理企业资料、品牌信息、商品资质与日文基础素材。</text>
    <rect class="card" y="200" width="700" height="82"/><text x="28" y="235" class="sans label gold">STEP 3</text><text x="120" y="235" class="serif h3 ink">店铺与商品页搭建</text><text x="120" y="266" class="sans" font-size="18" fill="#657276">完成日文标题、卖点、详情页结构、图片文案。</text>
  </g>

  <rect x="0" y="1710" width="1440" height="90" fill="#fffdf8" stroke="#ded6c8"/>
  <text x="130" y="1762" class="sans" font-size="19" fill="#657276">预览截取：首屏 / 市场介绍 / 电商入驻服务。完整页面还包括 PR 传播服务、咨询方法论与联系我们表单。</text>
</svg>
